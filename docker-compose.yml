version: "3.9"

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: rcm-postgres
    environment:
      POSTGRES_DB: road_crack_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rcm-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: rcm-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/road_crack_db
      REDIS_URL: redis://redis:6379/0
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD:-0.6}
    volumes:
      - ./services/api:/app
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  ai-worker:
    build:
      context: ./services/ai-worker
      dockerfile: Dockerfile
    container_name: rcm-ai-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/road_crack_db
      REDIS_URL: redis://redis:6379/0
      AI_PROVIDER: ${AI_PROVIDER:-onnx}
      STAGE1_MODEL_PATH: ${STAGE1_MODEL_PATH:-/models/stage1_efficientnet_b0.onnx}
      STAGE2_MODEL_PATH: ${STAGE2_MODEL_PATH:-/models/mobilenet_v2_model.onnx}
      MODEL_PATH: /models/crack_yolov8.pt
      TRITON_URL: ${TRITON_URL:-http://triton:8001}
    volumes:
      - ./services/ai-worker:/app
      - ./uploads:/app/uploads
      - ./models:/models:ro
    depends_on:
      - api
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: rcm-frontend
    environment:
      API_URL: http://api:8000
      VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    volumes:
      - ./services/frontend/src:/app/src
      - ./services/frontend/index.html:/app/index.html
    ports:
      - "3000:3000"
    depends_on:
      - api

  reporter:
    build:
      context: ./services/reporter
      dockerfile: Dockerfile
    container_name: rcm-reporter
    environment:
      API_URL: http://api:8000
    volumes:
      - ./services/reporter/src:/app/src
      - ./services/reporter/index.html:/app/index.html
    ports:
      - "3001:3001"
    depends_on:
      - api

  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: rcm-notification
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      LINE_NOTIFY_TOKEN: ${LINE_NOTIFY_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: rcm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
      - reporter

volumes:
  postgres_data:
  redis_data:
